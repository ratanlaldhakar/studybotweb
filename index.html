<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudyBot — Linear & Apple VisionOS Inspired SaaS</title>
  
  <!-- Telegram WebApp SDK & Supabase JS -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Inter & Plus Jakarta Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       DESIGN SYSTEM TOKENS (Linear / Apple / Arc Browser / Raycast Inspired)
       ═══════════════════════════════════════════════════════════════════════════ */
    :root {
      /* Color Palette */
      --bg-base: #09090b;
      --surface-secondary: #111827;
      --surface-tertiary: #1f2937;
      
      --glass-surface: rgba(255, 255, 255, 0.04);
      --glass-surface-hover: rgba(255, 255, 255, 0.07);
      --glass-surface-active: rgba(255, 255, 255, 0.1);
      
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.14);
      
      /* Accents */
      --accent-violet: #7c3aed;
      --accent-violet-hover: #6d28d9;
      --accent-cyan: #06b6d4;
      --accent-emerald: #22c55e;
      --accent-amber: #f59e0b;
      --accent-rose: #ef4444;
      
      --gradient-accent: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      --gradient-subtle: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
      
      /* Typography */
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-tertiary: #6b7280;
      
      /* Shadows & Elevation */
      --elevation-1: 0 8px 30px rgba(0, 0, 0, 0.35);
      --elevation-2: 0 16px 40px rgba(0, 0, 0, 0.45);
      --elevation-dock: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 1px rgba(255, 255, 255, 0.2);
      
      /* Motion */
      --ease-linear-custom: cubic-bezier(0.2, 0.8, 0.2, 1);
      --transition-fast: 150ms var(--ease-linear-custom);
      --transition-normal: 200ms var(--ease-linear-custom);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      /* Subtle noise texture & ambient light vignette */
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
      background-attachment: fixed;
    }

    /* Mobile Container Frame for Desktop Viewports */
    .app-shell {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 108px 16px;
      position: relative;
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       PROFILE & HERO HEADER (Apple VisionOS Glass Style)
       ═══════════════════════════════════════════════════════════════════════════ */
    .hero-profile-card {
      background: var(--gradient-subtle);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-top: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--elevation-1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .profile-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-identity {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar-mono {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--surface-secondary);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .user-title-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .badge-scholar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.2);
      padding: 2px 8px;
      border-radius: 6px;
      margin-top: 4px;
    }

    .streak-pill {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 12px;
      padding: 6px 12px;
      text-align: center;
    }

    .streak-val {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent-amber);
      line-height: 1;
    }

    .streak-lbl {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* XP Progress Bar */
    .xp-bar-wrapper {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border-subtle);
    }

    .xp-meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .progress-track-glass {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill-violet {
      height: 100%;
      width: 0%;
      background: var(--gradient-accent);
      border-radius: 100px;
      transition: width 0.6s var(--ease-linear-custom);
      position: relative;
    }

    .progress-fill-violet::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
      animation: shine 2.5s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       STAT CARDS (Raycast / Stripe Modern Dashboard)
       ═══════════════════════════════════════════════════════════════════════════ */
    .stats-bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .bento-card {
      background: var(--glass-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-top: 1px solid var(--border-light);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--elevation-1);
      transition: transform var(--transition-normal), border-color var(--transition-normal);
    }

    .bento-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-light);
    }

    .bento-card:active {
      transform: scale(0.98);
    }

    .bento-header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-tertiary);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .bento-number {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }

    /* Weekly Target Goal Bento Card */
    .weekly-goal-bento {
      background: var(--glass-surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-top: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: var(--elevation-1);
    }

    .goal-header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .goal-title-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .goal-pct-pill {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-emerald);
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* Filter Pills Bar */
    .filter-pills-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }
    .filter-pills-row::-webkit-scrollbar { display: none; }

    .pill-filter-btn {
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--glass-surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--transition-normal);
    }

    .pill-filter-btn:hover {
      background: var(--glass-surface-hover);
      color: var(--text-primary);
    }

    .pill-filter-btn.active {
      background: var(--surface-secondary);
      color: var(--text-primary);
      border-color: var(--border-light);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       TASK LIST & CARDS (Linear Style Minimal Row Cards)
       ═══════════════════════════════════════════════════════════════════════════ */
    .task-card-linear {
      background: var(--glass-surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-top: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--elevation-1);
      transition: transform var(--transition-normal), border-color var(--transition-normal);
    }

    .task-card-linear:hover {
      transform: translateY(-1px);
      border-color: var(--border-light);
    }

    .task-card-linear:active {
      transform: scale(0.98);
    }

    .task-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .task-main-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    /* Minimal Native Checkbox */
    .linear-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border-light);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .linear-checkbox.checked {
      background: var(--accent-violet);
      border-color: var(--accent-violet);
    }

    .linear-checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid #ffffff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .task-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .task-title.completed {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    /* Minimal Priority Badge */
    .priority-badge-minimal {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .prio-high {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-rose);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .prio-medium {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent-amber);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .prio-low {
      background: rgba(34, 197, 94, 0.1);
      color: var(--accent-emerald);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    /* Subtasks Accordion Inside Card */
    .subtasks-linear-box {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
    }

    .subtask-linear-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       PREMIUM EMPTY STATE (Linear Style)
       ═══════════════════════════════════════════════════════════════════════════ */
    .empty-state-card {
      background: var(--glass-surface);
      border: 1px dashed var(--border-light);
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      margin: 20px 0;
    }

    .empty-icon-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--surface-secondary);
      border: 1px solid var(--border-light);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .empty-heading {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .empty-subtext {
      font-size: 13px;
      color: var(--text-secondary);
      max-width: 260px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       POMODORO TIMER (Minimal Raycast Style)
       ═══════════════════════════════════════════════════════════════════════════ */
    .timer-raycast-card {
      background: var(--glass-surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-top: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 32px 20px;
      text-align: center;
      box-shadow: var(--elevation-2);
    }

    .timer-digits {
      font-size: 64px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      margin: 24px 0;
      font-variant-numeric: tabular-nums;
    }

    .timer-control-row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn-solid-accent {
      padding: 12px 28px;
      border-radius: 12px;
      background: var(--accent-violet);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all var(--transition-normal);
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
    }

    .btn-solid-accent:hover {
      background: var(--accent-violet-hover);
    }

    .btn-solid-accent:active {
      transform: scale(0.97);
    }

    .btn-glass-secondary {
      padding: 12px 20px;
      border-radius: 12px;
      background: var(--glass-surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-normal);
    }

    .btn-glass-secondary:hover {
      background: var(--glass-surface-hover);
      color: var(--text-primary);
    }

    .btn-glass-secondary:active {
      transform: scale(0.97);
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       FLOATING GLASS DOCK (iOS & Arc Browser Inspired)
       ═══════════════════════════════════════════════════════════════════════════ */
    .floating-dock-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 6px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: var(--elevation-dock);
      z-index: 9999;
    }

    .dock-tab-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-tertiary);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: all var(--transition-normal);
      flex: 1;
    }

    .dock-tab-btn.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-subtle);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .tab-content-pane { display: none; }
    .tab-content-pane.active { display: block; }
  </style>
</head>
<body>

  <div class="app-shell">
    
    <!-- Profile Hero Card -->
    <div class="hero-profile-card">
      <div class="profile-top-row">
        <div class="user-identity">
          <div class="avatar-mono" id="userAvatar">S</div>
          <div>
            <div class="user-title-name" id="userName">Student</div>
            <div class="badge-scholar" id="userLevel"><i data-lucide="shield"></i> Level 1 Scholar</div>
          </div>
        </div>
        <div class="streak-pill">
          <div class="streak-val" id="streakCount">0</div>
          <div class="streak-lbl">Days Streak</div>
        </div>
      </div>

      <div class="xp-bar-wrapper">
        <div class="xp-meta-row">
          <span>Level Progress</span>
          <span id="xpText">0 / 100 XP</span>
        </div>
        <div class="progress-track-glass">
          <div class="progress-fill-violet" id="xpBarFill"></div>
        </div>
      </div>
    </div>

    <!-- Tab Pane 1: Tasks -->
    <div id="paneTasks" class="tab-content-pane active">

      <!-- Stats Bento Grid -->
      <div class="stats-bento-grid">
        <div class="bento-card">
          <div class="bento-header"><i data-lucide="zap" style="width:16px; height:16px;"></i> Total XP</div>
          <div class="bento-number" id="totalXpVal">0</div>
        </div>
        <div class="bento-card">
          <div class="bento-header"><i data-lucide="check-circle-2" style="width:16px; height:16px;"></i> Completed</div>
          <div class="bento-number" id="tasksDoneVal">0</div>
        </div>
      </div>

      <!-- Weekly Goal Bento Card -->
      <div class="weekly-goal-bento">
        <div class="goal-header-flex">
          <span class="goal-title-text"><i data-lucide="target" style="width:18px; height:18px; color:var(--accent-emerald);"></i> Weekly Target Goal</span>
          <span class="goal-pct-pill" id="goalPctText">0%</span>
        </div>
        <div class="progress-track-glass" style="height:10px;">
          <div class="progress-fill-violet" id="goalFillBar" style="background: linear-gradient(90deg, #22c55e 0%, #06b6d4 100%);"></div>
        </div>
      </div>

      <!-- Filter Pills Row -->
      <div class="filter-pills-row">
        <button class="pill-filter-btn active" onclick="filterTasks('all', this)">All Tasks</button>
        <button class="pill-filter-btn" onclick="filterTasks('high', this)">High Priority</button>
        <button class="pill-filter-btn" onclick="filterTasks('recurring', this)">Routines</button>
        <button class="pill-filter-btn" onclick="filterTasks('completed', this)">Completed</button>
      </div>

      <!-- Task List Container -->
      <div id="taskListContainer"></div>

    </div>

    <!-- Tab Pane 2: Timer -->
    <div id="paneTimer" class="tab-content-pane">
      <div class="timer-raycast-card">
        <div style="display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:12px; background:var(--surface-secondary); border:1px solid var(--border-light); margin-bottom:12px;">
          <i data-lucide="timer" style="width:22px; height:22px; color:var(--accent-violet);"></i>
        </div>
        <h2 style="font-size:20px; font-weight:700;">Focus Session</h2>
        <p style="font-size:13px; color:var(--text-secondary); margin-top:4px;">Pomodoro Study Interval</p>

        <div class="timer-digits" id="timerDisplay">25:00</div>

        <div class="timer-control-row">
          <button class="btn-solid-accent" id="btnStartTimer" onclick="toggleTimer()">Start Focus</button>
          <button class="btn-glass-secondary" onclick="resetTimer()">Reset</button>
        </div>
      </div>
    </div>

    <!-- Tab Pane 3: Leaderboard -->
    <div id="paneRank" class="tab-content-pane">
      <div class="bento-card" style="margin-bottom:12px; text-align:center;">
        <h2 style="font-size:18px; font-weight:700;">Leaderboard</h2>
        <p style="font-size:13px; color:var(--text-secondary); margin-top:2px;">Top Performing Scholars</p>
      </div>
      <div id="leaderboardContainer"></div>
    </div>

    <!-- Floating Navigation Dock -->
    <div class="floating-dock-bar">
      <div class="dock-tab-btn active" onclick="switchTab('paneTasks', this)">
        <i data-lucide="list-todo" style="width:18px; height:18px;"></i>
        <span>Tasks</span>
      </div>
      <div class="dock-tab-btn" onclick="switchTab('paneTimer', this)">
        <i data-lucide="timer" style="width:18px; height:18px;"></i>
        <span>Timer</span>
      </div>
      <div class="dock-tab-btn" onclick="switchTab('paneRank', this)">
        <i data-lucide="trophy" style="width:18px; height:18px;"></i>
        <span>Rank</span>
      </div>
    </div>

  </div>

  <script>
    // Initialize Telegram & Supabase SDKs
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SUPABASE_URL = "https://kgfbwcchftywjhkdqqxn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnZmJ3Y2NoZnR5d2poa2RxcXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MjYxNjMsImV4cCI6MjA5OTQwMjE2M30.LwpTocZwf-0SayLgQgRP974-d5VlRy2OiGRUVrj_Gm0";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let userId = 5774713642;
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      const u = tg.initDataUnsafe.user;
      userId = u.id;
      document.getElementById('userName').innerText = u.first_name || 'Student';
      document.getElementById('userAvatar').innerText = (u.first_name || 'S')[0].toUpperCase();
    }

    let allTasksData = [];
    let allSubtasksData = [];

    function triggerHaptic() {
      try {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      } catch(e) {}
    }

    async function fetchAppContent() {
      try {
        // Fetch XP
        const { data: xp } = await supabaseClient.from('user_xp').select('*').eq('user_id', userId).single();
        if (xp) {
          document.getElementById('totalXpVal').innerText = (xp.total_xp || 0).toLocaleString();
          document.getElementById('userLevel').innerHTML = `<i data-lucide="shield" style="width:14px; height:14px;"></i> Level ${xp.level || 1} Scholar`;
          const currentXp = xp.total_xp || 0;
          const nextLevelXp = (xp.level || 1) * 100;
          const pct = Math.min((currentXp / nextLevelXp) * 100, 100);
          document.getElementById('xpBarFill').style.width = `${pct}%`;
          document.getElementById('xpText').innerText = `${currentXp} / ${nextLevelXp} XP`;
        }

        // Fetch Weekly Goal
        const { data: goal } = await supabaseClient.from('user_goals').select('*').eq('user_id', userId).single();
        const weeklyTarget = goal ? goal.weekly_target : 15;

        // Fetch Tasks & Subtasks
        const { data: tasks } = await supabaseClient.from('tasks').select('*').eq('user_id', userId).eq('archived', false).order('user_task_num', { ascending: true });
        const { data: subtasks } = await supabaseClient.from('subtasks').select('*').eq('user_id', userId);

        allTasksData = tasks || [];
        allSubtasksData = subtasks || [];

        const doneCount = allTasksData.filter(t => t.completed).length;
        document.getElementById('tasksDoneVal').innerText = doneCount;

        const goalPct = Math.min(Math.round((doneCount / weeklyTarget) * 100), 100);
        document.getElementById('goalPctText').innerText = `${goalPct}%`;
        document.getElementById('goalFillBar').style.width = `${goalPct}%`;

        renderTasksList(allTasksData);
        renderLeaderboard();
        lucide.createIcons();

      } catch (err) {
        console.error('Fetch error:', err);
      }
    }

    function renderTasksList(tasks) {
      const container = document.getElementById('taskListContainer');
      if (!tasks || tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state-card">
            <div class="empty-icon-wrapper"><i data-lucide="inbox" style="width:24px; height:24px;"></i></div>
            <div class="empty-heading">No Active Tasks</div>
            <div class="empty-subtext">Aapke paas abhi koi active task nahi hai. Bot chat me /add se new task add karein.</div>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      container.innerHTML = '';
      tasks.forEach(t => {
        const card = document.createElement('div');
        card.className = 'task-card-linear';

        const isDone = t.completed;
        const prio = (t.priority || 'medium').toLowerCase();
        const prioClass = `prio-${prio}`;
        const prioLabel = prio.toUpperCase();

        const taskSubtasks = allSubtasksData.filter(s => s.task_id === t.id);
        let subtasksHtml = '';

        if (taskSubtasks.length > 0) {
          subtasksHtml = `<div class="subtasks-linear-box">` + taskSubtasks.map(s => `
            <div class="subtask-linear-row">
              <div class="linear-checkbox ${s.completed ? 'checked' : ''}" onclick="toggleSubtask(${s.id}, ${!s.completed})"></div>
              <span style="${s.completed ? 'text-decoration:line-through; color: var(--text-tertiary);' : ''}">${s.title}</span>
            </div>
          `).join('') + `</div>`;
        }

        card.innerHTML = `
          <div class="task-row-top">
            <div class="task-main-info">
              <div class="linear-checkbox ${isDone ? 'checked' : ''}" onclick="toggleTask(${t.user_task_num}, ${!isDone})"></div>
              <span class="task-title ${isDone ? 'completed' : ''}">#${t.user_task_num} ${t.task}</span>
            </div>
            <span class="priority-badge-minimal ${prioClass}">${prioLabel}</span>
          </div>
          ${subtasksHtml}
        `;

        container.appendChild(card);
      });
      lucide.createIcons();
    }

    async function toggleTask(num, isCompleted) {
      triggerHaptic();
      await supabaseClient.from('tasks').update({ completed: isCompleted }).eq('user_id', userId).eq('user_task_num', num);
      fetchAppContent();
    }

    async function toggleSubtask(id, isCompleted) {
      triggerHaptic();
      await supabaseClient.from('subtasks').update({ completed: isCompleted }).eq('id', id);
      fetchAppContent();
    }

    function filterTasks(type, el) {
      triggerHaptic();
      document.querySelectorAll('.pill-filter-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');

      if (type === 'all') renderTasksList(allTasksData);
      else if (type === 'high') renderTasksList(allTasksData.filter(t => (t.priority || 'medium').toLowerCase() === 'high'));
      else if (type === 'recurring') renderTasksList(allTasksData.filter(t => t.task_type === 'recurring'));
      else if (type === 'completed') renderTasksList(allTasksData.filter(t => t.completed));
    }

    function switchTab(paneId, el) {
      triggerHaptic();
      document.querySelectorAll('.dock-tab-btn').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content-pane').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(paneId).classList.add('active');
      lucide.createIcons();
    }

    async function renderLeaderboard() {
      try {
        const { data: users } = await supabaseClient.from('user_xp').select('*').order('total_xp', { ascending: false }).limit(5);
        const listEl = document.getElementById('leaderboardContainer');
        if (!users) return;

        listEl.innerHTML = users.map((u, i) => `
          <div class="bento-card" style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
            <div style="display:flex; align-items:center; gap:12px;">
              <span style="font-size:16px; font-weight:800; color:var(--accent-violet);">#${i + 1}</span>
              <div>
                <div style="font-weight:600; font-size:14px;">Student ID: ${u.user_id}</div>
                <div style="font-size:12px; color:var(--text-tertiary);">Level ${u.level || 1}</div>
              </div>
            </div>
            <span style="font-weight:700; color:var(--accent-cyan);">${(u.total_xp || 0).toLocaleString()} XP</span>
          </div>
        `).join('');
      } catch(e) {}
    }

    // Timer Logic
    let timerSeconds = 25 * 60;
    let timerInterval = null;

    function toggleTimer() {
      triggerHaptic();
      const btn = document.getElementById('btnStartTimer');
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        btn.innerText = 'Resume Focus';
      } else {
        btn.innerText = 'Pause Session';
        timerInterval = setInterval(() => {
          if (timerSeconds > 0) {
            timerSeconds--;
            updateTimerDisplay();
          } else {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = 'Session Complete!';
            triggerHaptic();
          }
        }, 1000);
      }
    }

    function resetTimer() {
      triggerHaptic();
      clearInterval(timerInterval);
      timerInterval = null;
      timerSeconds = 25 * 60;
      updateTimerDisplay();
      document.getElementById('btnStartTimer').innerText = 'Start Focus';
    }

    function updateTimerDisplay() {
      const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
      const s = (timerSeconds % 60).toString().padStart(2, '0');
      document.getElementById('timerDisplay').innerText = `${m}:${s}`;
    }

    fetchAppContent();
    lucide.createIcons();
  </script>
</body>
</html>
